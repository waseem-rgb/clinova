server {
    listen 80;
    listen [::]:80;
    server_name medcompanion.in www.medcompanion.in;

    # Redirect everything to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name medcompanion.in www.medcompanion.in;

    # Let's Encrypt certs
    ssl_certificate     /etc/letsencrypt/live/medcompanion.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medcompanion.in/privkey.pem;

    # Recommended SSL params (safe even if files don't exist; but we include them only if present)
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Frontend (Vite build output)
    root /home/medcompanion/apps/medcompanion/frontend/dist;
    index index.html;

    # Serve SPA (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API -> FastAPI (uvicorn on 9000)
    location /api/ {
        # Allow large file uploads (PDFs, images)
        client_max_body_size 50m;

        # Extended timeouts for file processing
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;

        # Don't buffer uploads to disk (stream directly)
        proxy_request_buffering off;

        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # (Optional) websockets
    location /ws/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
